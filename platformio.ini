; Zephyr — EDF TVC Rocket
; PlatformIO project anchor. The firmware lives under firmware/ (mirrors SPARC),
; so src/lib/include are remapped here. Build env + lib_deps added during bring-up.

[platformio]
src_dir      = firmware/src
lib_dir      = firmware/lib
include_dir  = firmware/include
default_envs = heltec_wifi_lora_32_V3

[env:heltec_wifi_lora_32_V3]
platform = espressif32
board = heltec_wifi_lora_32_V3
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = huge_app.csv
monitor_filters = esp32_exception_decoder
; Make firmware/include/ visible to lib/ modules too (include_dir alone only
; covers src/). Unique header name (zephyr_config.h) avoids colliding with the
; config.h that several Arduino libraries ship.
build_flags = -I firmware/include
lib_deps =
    ; Sensors
    adafruit/Adafruit BMP3XX Library
    adafruit/Adafruit MPU6050
    adafruit/Adafruit Unified Sensor
    pololu/VL53L1X
    ; Servo + ESC control (ESP32 hardware PWM; replaces Arduino Servo)
    madhephaestus/ESP32Servo
    ; On-board 0.96" OLED (SSD1306)
    thingpulse/ESP8266 and ESP32 OLED driver for SSD1306 displays
; WiFi is built into the ESP32 Arduino framework — no library needed.
; LoRa radio left disabled; no SD card.
